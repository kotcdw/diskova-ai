name: Deploy to Railway

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'OpenAI API Key'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Deploy to Railway
        run: |
          echo "Deployment would use Railway CLI"
          # railway login
          # railway init
          # railway up
          echo "Configure Railway manually with:"
          echo "  1. railway login"
          echo "  2. railway init"
          echo "  3. railway up"