name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run tests
        run: |
          echo "Running tests..."
          python -c "from diskova.main import app; print('App loaded successfully')"

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t diskova-plus:${{ github.sha }} .
        
      - name: Test container
        run: |
          docker run -d -p 8000:8000 --name diskova-test diskova-plus:${{ github.sha }}
          sleep 5
          docker logs diskova-test
          docker stop diskova-test
          docker rm diskova-test